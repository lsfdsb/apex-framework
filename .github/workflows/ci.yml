name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Framework
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ── Shell script syntax ──────────────────────────────────────────────────
      - name: Validate shell scripts
        run: |
          echo "==> Checking shell script syntax..."
          failed=0
          for f in .claude/scripts/*.sh; do
            if bash -n "$f"; then
              echo "  OK  $f"
            else
              echo "  FAIL $f"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "One or more shell scripts have syntax errors." >&2
            exit 1
          fi
          echo "All shell scripts passed syntax check."

      # ── JSON validation ──────────────────────────────────────────────────────
      - name: Validate JSON files
        run: |
          echo "==> Validating JSON files..."
          if ! command -v jq &>/dev/null; then
            echo "jq not found — installing..." >&2
            sudo apt-get install -y -q jq
          fi
          failed=0
          for f in .claude/settings.json .claude/settings.local.json; do
            if [ -f "$f" ]; then
              if jq empty "$f" 2>/dev/null; then
                echo "  OK  $f"
              else
                echo "  FAIL $f" >&2
                failed=1
              fi
            else
              echo "  SKIP $f (not present)"
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "One or more JSON files are malformed." >&2
            exit 1
          fi
          echo "All JSON files are valid."

      # ── Hook scripts: presence + shebang ────────────────────────────────────
      - name: Check hook scripts
        run: |
          echo "==> Checking hook scripts..."
          hooks_dir=".claude/git-hooks"
          if [ ! -d "$hooks_dir" ]; then
            echo "No git-hooks directory found — skipping hook checks."
          else
            failed=0
            count=0
            for f in "$hooks_dir"/*; do
              [ -f "$f" ] || continue
              count=$((count + 1))
              first=$(head -1 "$f")
              if [[ "$first" == "#!"* ]]; then
                echo "  OK  $f  ($first)"
              else
                echo "  WARN $f — missing shebang line" >&2
                failed=1
              fi
            done
            echo "Checked $count hook script(s)."
            if [ "$failed" -eq 1 ]; then
              echo "One or more hook scripts are missing a shebang line." >&2
              exit 1
            fi
          fi

      # ── Agent frontmatter: YAML delimiters ──────────────────────────────────
      - name: Verify agent frontmatter
        run: |
          echo "==> Verifying agent frontmatter in .claude/agents/..."
          failed=0
          count=0
          for f in .claude/agents/*.md; do
            [ -f "$f" ] || continue
            count=$((count + 1))
            first_line=$(head -1 "$f")
            # Check that the file starts with --- and has a closing ---
            delimiter_count=$(grep -c '^---$' "$f" || true)
            if [[ "$first_line" == "---" ]] && [ "$delimiter_count" -ge 2 ]; then
              echo "  OK  $f"
            else
              echo "  FAIL $f — missing or malformed YAML frontmatter delimiters" >&2
              failed=1
            fi
          done
          if [ "$count" -eq 0 ]; then
            echo "No agent files found in .claude/agents/"
          else
            echo "Checked $count agent file(s)."
          fi
          if [ "$failed" -eq 1 ]; then
            echo "One or more agent files have invalid frontmatter." >&2
            exit 1
          fi

      # ── Showcase app: build + test ──────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/design-dna/showcase/package-lock.json

      - name: Install showcase dependencies
        working-directory: docs/design-dna/showcase
        run: npm ci

      - name: Typecheck showcase app
        working-directory: docs/design-dna/showcase
        run: npm run typecheck

      - name: Lint showcase app
        working-directory: docs/design-dna/showcase
        run: npm run lint

      - name: Test showcase app
        working-directory: docs/design-dna/showcase
        run: npm test

      - name: Build showcase app
        working-directory: docs/design-dna/showcase
        run: npm run build

      # ── Inventory report ─────────────────────────────────────────────────────
      - name: Report framework inventory
        run: |
          echo "==> APEX Framework Inventory"
          echo "----------------------------"

          skill_count=0
          if [ -d ".claude/skills" ]; then
            skill_count=$(find .claude/skills -maxdepth 1 -mindepth 1 -type d | wc -l | tr -d ' ')
          fi
          echo "  Skills:  $skill_count"

          agent_count=0
          if [ -d ".claude/agents" ]; then
            agent_count=$(find .claude/agents -maxdepth 1 -name "*.md" | wc -l | tr -d ' ')
          fi
          echo "  Agents:  $agent_count"

          script_count=0
          if [ -d ".claude/scripts" ]; then
            script_count=$(find .claude/scripts -maxdepth 1 -name "*.sh" | wc -l | tr -d ' ')
          fi
          echo "  Scripts: $script_count"

          echo "----------------------------"

      # ── Framework-specific checks ───────────────────────────────────────────
      # health-check.sh was deprecated in v5.23 — shell script syntax validation above is sufficient

  # ── Release ──────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    # Only run on direct pushes to main — not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history so we can push the CHANGELOG commit back
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: version
        run: |
          version=$(cat VERSION | tr -d '[:space:]')
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "title=APEX Framework v${version}" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release $tag already exists — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release $tag does not exist — proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG
        id: notes
        if: steps.check.outputs.skip == 'false'
        run: |
          # Extract everything between ## [Unreleased] and the next ## heading
          notes=$(awk '/^## \[Unreleased\]/{found=1; next} found && /^## /{exit} found{print}' CHANGELOG.md)
          if [ -z "$notes" ]; then
            echo "No [Unreleased] section found in CHANGELOG.md — using default message."
            notes="See CHANGELOG.md for details."
          fi
          # Write to file to avoid quoting issues with multiline strings
          echo "$notes" > /tmp/release-notes.md
          echo "Release notes extracted ($(echo "$notes" | wc -l) lines)."

      - name: Update CHANGELOG — stamp version and date
        if: steps.check.outputs.skip == 'false'
        run: |
          version="${{ steps.version.outputs.version }}"
          date_today=$(date -u '+%Y-%m-%d')

          # Skip if this version section already exists
          if grep -q "^## \[${version}\]" CHANGELOG.md; then
            echo "Version [${version}] already exists in CHANGELOG.md — skipping stamp."
            # Just ensure [Unreleased] section exists above it
            if ! grep -q "^## \[Unreleased\]" CHANGELOG.md; then
              sed -i "0,/^## \[${version}\]/s|^## \[${version}\]|## [Unreleased]\n\n## [${version}]|" CHANGELOG.md
            fi
          else
            # Replace [Unreleased] heading with versioned heading
            sed -i "s|^## \[Unreleased\]|## [${version}] — ${date_today}|" CHANGELOG.md
            # Prepend a new empty [Unreleased] section above it (first match only)
            sed -i "0,/^## \[${version}\]/s|^## \[${version}\]|## [Unreleased]\n\n## [${version}]|" CHANGELOG.md
          fi

      - name: Commit CHANGELOG update
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(release): stamp CHANGELOG for v${{ steps.version.outputs.version }}" || echo "Nothing to commit."
          git push origin main

      - name: Create git tag
        if: steps.check.outputs.skip == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.title }}" \
            --notes-file /tmp/release-notes.md \
            --repo "$GITHUB_REPOSITORY"
          echo "Released: ${{ steps.version.outputs.title }}"

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # Automated review on every PR
  review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR following APEX Framework standards (see CLAUDE.md):

            1. **Bugs**: Logic errors, null/undefined risks, race conditions
            2. **Security**: Injection, XSS, hardcoded secrets, auth gaps (OWASP Top 10)
            3. **Performance**: N+1 queries, unnecessary re-renders, large bundles
            4. **Quality**: TypeScript strict, naming, functions ≤30 lines, files ≤300 lines
            5. **Tests**: Are critical paths tested? Missing edge cases?

            Be concise and actionable. If everything looks clean, say "LGTM".
          claude_args: "--max-turns 5"

  # Interactive: respond to @claude mentions in comments
  interact:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      contains(github.event.comment.body, '@claude')
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          claude_args: "--max-turns 10"

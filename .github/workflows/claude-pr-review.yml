name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude PR Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Get the diff for this PR
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD)

          # Get changed file list
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          # Run Claude in headless mode for code review
          claude -p "You are a senior code reviewer. Review this PR diff for:

          1. **Bugs**: Logic errors, off-by-one, null/undefined risks, race conditions
          2. **Security**: Injection, XSS, hardcoded secrets, auth gaps (OWASP Top 10)
          3. **Performance**: N+1 queries, unnecessary re-renders, large bundles
          4. **Quality**: TypeScript strict compliance, naming, function length (<30 lines)
          5. **Tests**: Are critical paths tested? Missing edge cases?

          Changed files:
          $FILES

          Diff:
          $DIFF

          Output format:
          ## Claude Code Review

          ### 🔴 Critical (must fix before merge)
          - [file:line] Issue description → Suggested fix

          ### 🟡 Warnings (should fix)
          - [file:line] Issue description → Suggested fix

          ### 🟢 Suggestions (nice to have)
          - Improvement ideas

          ### ✅ What looks good
          - Positive observations

          If everything looks clean, say '✅ LGTM — no issues found.'
          Keep the review concise and actionable. No fluff." \
          --output-format text > review.txt

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: review
            });
